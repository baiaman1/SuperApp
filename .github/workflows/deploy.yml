name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 54.164.9.91
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            if [ ! -d /var/www/superapp-src/.git ]; then
              git clone https://github.com/baiaman1/SuperApp.git /var/www/superapp-src
            fi

            cd /var/www/superapp-src
            git fetch --all
            git reset --hard origin/master

            dotnet publish src/SuperAppBackend.WebApi/SuperAppBackend.WebApi.csproj -c Release -o /var/www/superapp

            sudo -n systemctl restart superapp
            sudo -n systemctl status superapp --no-pager -l

            curl -f http://127.0.0.1:5000/api/health
