name: Deploy Backend and Build APK

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      HOST: 32.194.207.165
      USER: ubuntu
      APP_DIR: /var/www/superapp
      TMP_DIR: /home/ubuntu/superapp-deploy
      ARCHIVE: /home/ubuntu/superapp-backend.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Publish backend
        run: |
          set -euo pipefail

          dotnet restore src/SuperAppBackend.WebApi/SuperAppBackend.WebApi.csproj
          dotnet publish src/SuperAppBackend.WebApi/SuperAppBackend.WebApi.csproj \
            -c Release \
            -o publish \
            /p:UseAppHost=false

          tar -czf superapp-backend.tar.gz -C publish .

      - name: Setup SSH
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts

      - name: Upload package
        run: |
          set -euo pipefail
          scp superapp-backend.tar.gz "$USER@$HOST:$ARCHIVE"

      - name: Deploy on server
        run: |
          set -euo pipefail

          ssh "$USER@$HOST" "
            set -euo pipefail

            rm -rf '$TMP_DIR'
            mkdir -p '$TMP_DIR'
            tar -xzf '$ARCHIVE' -C '$TMP_DIR'

            sudo mkdir -p '$APP_DIR'
            sudo rsync -a --delete '$TMP_DIR'/ '$APP_DIR'/

            sudo systemctl restart superapp

            for i in \$(seq 1 30); do
              if curl -fsS http://127.0.0.1:5000/api/health > /dev/null; then
                echo 'Health check passed'
                break
              fi

              if [ \"\$i\" -eq 30 ]; then
                echo 'Health check failed after waiting'
                sudo systemctl status superapp --no-pager -l || true
                sudo journalctl -u superapp -n 100 --no-pager || true
                exit 1
              fi

              sleep 2
            done

            sudo systemctl status superapp --no-pager -l
            curl -fsS http://127.0.0.1:5000/api/health
          "

  build_android_apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        working-directory: src/frontend/superapp_mobile
        run: flutter pub get

      - name: Build Android APK
        working-directory: src/frontend/superapp_mobile
        run: >
          flutter build apk --release
          --dart-define=API_BASE_URL=http://32.194.207.165

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: superapp-mobile-apk-${{ github.sha }}
          path: src/frontend/superapp_mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
