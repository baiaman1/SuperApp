name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 32.194.207.165
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 20m
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/baiaman1/SuperApp.git"
            BRANCH="master"
            SRC_DIR="/home/ubuntu/superapp-src"
            APP_DIR="/var/www/superapp"

            mkdir -p "$SRC_DIR"
            sudo mkdir -p "$APP_DIR"

            if [ ! -d "$SRC_DIR/.git" ]; then
              rm -rf "$SRC_DIR"
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$SRC_DIR"
            fi

            cd "$SRC_DIR"
            git fetch origin "$BRANCH" --prune
            git reset --hard "origin/$BRANCH"

            dotnet publish src/SuperAppBackend.WebApi/SuperAppBackend.WebApi.csproj -c Release -o "$APP_DIR"

            sudo systemctl restart superapp
            sudo systemctl status superapp --no-pager -l

            curl -f http://127.0.0.1:5000/api/health
