name: Deploy Backend

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: 32.194.207.165
          username: ubuntu
          key: ${{ secrets.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            REPO_URL="https://github.com/baiaman1/SuperApp.git"
            BRANCH="master"
            SRC_DIR="/home/ubuntu/superapp-src"
            PUBLISH_DIR="/home/ubuntu/superapp-publish"
            APP_DIR="/var/www/superapp"

            if [ ! -d "$SRC_DIR/.git" ]; then
              rm -rf "$SRC_DIR"
              git clone --depth 1 --branch "$BRANCH" "$REPO_URL" "$SRC_DIR"
            fi

            cd "$SRC_DIR"
            git fetch origin "$BRANCH" --prune
            git reset --hard "origin/$BRANCH"

            rm -rf "$PUBLISH_DIR"
            mkdir -p "$PUBLISH_DIR"

            dotnet publish src/SuperAppBackend.WebApi/SuperAppBackend.WebApi.csproj \
              -c Release \
              -o "$PUBLISH_DIR"

            sudo mkdir -p "$APP_DIR"
            sudo rsync -a --delete "$PUBLISH_DIR"/ "$APP_DIR"/

            sudo systemctl restart superapp

            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:5000/api/health > /dev/null; then
                echo "Health check passed"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "Health check failed after waiting"
                sudo systemctl status superapp --no-pager -l || true
                sudo journalctl -u superapp -n 100 --no-pager || true
                exit 1
              fi

              sleep 2
            done

            sudo systemctl status superapp --no-pager -l
            curl -fsS http://127.0.0.1:5000/api/health
